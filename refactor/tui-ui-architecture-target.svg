"29.25" x="2220.3763" y="385.333">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="2276.9466" y="385.333">X</text><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="152.5264" y2="152.5264"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="168.2559" y2="168.2559"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="183.9854" y2="183.9854"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="199.7148" y2="199.7148"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="215.4443" y2="215.4443"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="231.1738" y2="231.1738"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="246.9033" y2="246.9033"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="262.6328" y2="262.6328"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="278.3623" y2="278.3623"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="294.0918" y2="294.0918"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="309.8213" y2="309.8213"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="325.5508" y2="325.5508"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="341.2803" y2="341.2803"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="357.0098" y2="357.0098"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="372.7393" y2="372.7393"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2323.3226" y1="388.4688" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="2111.7552" x2="2111.7552" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="2220.3763" x2="2220.3763" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="2265.9779" x2="2265.9779" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="2323.3226" x2="2323.3226" y1="152.5264" y2="388.4688"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="2111.7552" y="403.0625">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="2111.7552" y="418.792">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="2111.7552" y="434.5215">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="2111.7552" y="450.251">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="2111.7552" y="465.9805">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="2111.7552" y="481.71">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="2111.7552" y="497.4395">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="2111.7552" y="513.1689">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="2238.3338" y="513.1689">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="2111.7552" y="528.8984">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="2192.7005" y="528.8984">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="2359.701" y="528.8984">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="2111.7552" y="544.6279">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="2111.7552" y="560.3574">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="2111.7552" y="576.0869">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="2111.7552" y="591.8164">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="2111.7552" y="607.5459">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="2111.7552" y="623.2754">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="2219.5701" y="623.2754">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="2111.7552" y="639.0049">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="2111.7552" y="654.7344">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="2111.7552" y="670.4639">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="2111.7552" y="686.1934">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="2111.7552" y="701.9229">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="2111.7552" y="717.6523">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3049.2406" x2="3049.2406" y1="3975.0593" y2="5224.3115"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3049.2406" x2="3152.763" y1="5224.3115" y2="5224.3115"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3152.763" x2="3152.763" y1="5224.3115" y2="5279.041"/><polygon fill="#888888" points="3152.763,5279.041,3156.763,5270.041,3152.763,5274.041,3148.763,5270.041,3152.763,5279.041" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="3052.2406" y="5248.9053">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5419.1589" x2="5419.1589" y1="2462.3086" y2="2487.3086"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5419.1589" x2="5543.0446" y1="2487.3086" y2="2487.3086"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5543.0446" x2="5543.0446" y1="2487.3086" y2="5264.041"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5543.0446" x2="3874.0931" y1="5264.041" y2="5264.041"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3874.0931" x2="3874.0931" y1="5264.041" y2="5279.041"/><polygon fill="#888888" points="3874.0931,