ize="14" lengthAdjust="spacing" textLength="194.6943" x="4578.8817" y="4202.3544">The ONLY way frontends talk</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="161.2666" x="4578.8817" y="4219.2939">to engine. No trait impls,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="170.0439" x="4578.8817" y="4236.2333">no callbacks, no UI types.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="176.6133" x="4578.8817" y="4253.1728">No engine-side state leaks</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="128.1123" x="4578.8817" y="4270.1122">(no `processes`, no</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="155.4561" x="4578.8817" y="4287.0517">`runtime_approvals`, no</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="159.7832" x="4578.8817" y="4303.9911">`permissions`) &#8212; all that</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="117.1611" x="4578.8817" y="4320.9306">lives in tui::* now.</text></g><!--class EngineConfig--><g class="entity" data-qualified-name="ENG.EngineConfig" data-source-line="471" id="ent0082"><rect fill="#F1F1F1" height="32" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="121.1475" x="4431.7342" y="4198.8808"/><ellipse cx="4446.7342" cy="4214.8808" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M4449.2074,4221.0239 Q4448.6263,4221.3227 4447.9871,4221.4721 Q4447.348,4221.6215 4446.6424,4221.6215 Q4444.1356,4221.6215 4442.8158,4219.9697 Q4441.4959,4218.3178 4441.4959,4215.1967 Q4441.4959,4212.0673 4442.8158,4210.4155 Q4444.1356,4208.7636 4446.6424,4208.7636 Q4447.348,4208.7636 4447.9954,4208.913 Q4448.6429,4209.0624 4449.2074,4209.3613 L4449.2074,4212.0839 Q4448