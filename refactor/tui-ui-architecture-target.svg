"341.2803"/><line style="stroke:#000000;stroke-width:1;" x1="1916.0874" x2="2127.6548" y1="357.0098" y2="357.0098"/><line style="stroke:#000000;stroke-width:1;" x1="1916.0874" x2="2127.6548" y1="372.7393" y2="372.7393"/><line style="stroke:#000000;stroke-width:1;" x1="1916.0874" x2="2127.6548" y1="388.4688" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="1916.0874" x2="1916.0874" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="2024.7085" x2="2024.7085" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="2070.3101" x2="2070.3101" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="2127.6548" x2="2127.6548" y1="152.5264" y2="388.4688"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="1916.0874" y="403.0625">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="1916.0874" y="418.792">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="1916.0874" y="434.5215">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="1916.0874" y="450.251">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="1916.0874" y="465.9805">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="1916.0874" y="481.71">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="1916.0874" y="497.4395">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="1916.0874" y="513.1689">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="2042.666" y="513.1689">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="1916.0874" y="528.8984">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="1997.0327" y="528.8984">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="2164.0332" y="528.8984">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="1916.0874" y="544.6279">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="1916.0874" y="560.3574">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="1916.0874" y="576.0869">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="1916.0874" y="591.8164">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="1916.0874" y="607.5459">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="1916.0874" y="623.2754">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="2023.9023" y="623.2754">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="1916.0874" y="639.0049">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="1916.0874" y="654.7344">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="1916.0874" y="670.4639">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="1916.0874" y="686.1934">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="1916.0874" y="701.9229">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="1916.0874" y="717.6523">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4661.3" x2="4661.3" y1="4419.4321" y2="5697.585"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4661.3" x2="4764.8224" y1="5697.585" y2="5697.585"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4764.8224" x2="4764.8224" y1="5697.585" y2="5737.3145"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4764.8224" x2="4661.3" y1="5737.3145" y2="5737.3145"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4661.3" x2="4661.3" y1="5737.3145" y2="5752.3145"/><polygon fill="#888888" points="4661.3,5752.3145,4665.3,5743.3145,4661.3,5747.3145,4657.3,5743.3145,4661.3,5752.3145" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="4664.3" y="5722.1787">uses wire types</text><line st