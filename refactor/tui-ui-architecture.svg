9" y1="216.7954" y2="216.7954"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="232.5249" y2="232.5249"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="248.2544" y2="248.2544"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="263.9839" y2="263.9839"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="279.7134" y2="279.7134"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="295.4429" y2="295.4429"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="311.1724" y2="311.1724"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="326.9019" y2="326.9019"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="342.6313" y2="342.6313"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="358.3608" y2="358.3608"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="374.0903" y2="374.0903"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="389.8198" y2="389.8198"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="405.5493" y2="405.5493"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="421.2788" y2="421.2788"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="6017.7879" y1="437.0083" y2="437.0083"/><line style="stroke:#000000;stroke-width:1;" x1="5806.2205" x2="5806.2205" y1="201.0659" y2="437.0083"/><line style="stroke:#000000;stroke-width:1;" x1="5914.8416" x2="5914.8416" y1="201.0659" y2="437.0083"/><line style="stroke:#000000;stroke-width:1;" x1="5960.4432" x2="5960.4432" y1="201.0659" y2="437.0083"/><line style="stroke:#000000;stroke-width:1;" x1="6017.7879" x2="6017.7879" y1="201.0659" y2="437.0083"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="5806.2205" y="451.6021">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="5806.2205" y="467.3315">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="5806.2205" y="483.061">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="5806.2205" y="498.7905">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="5806.2205" y="514.52">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="5806.2205" y="530.2495">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="5806.2205" y="545.979">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="5806.2205" y="561.7085">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="5932.7992" y="561.7085">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="5806.2205" y="577.438">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="5887.1659" y="577.438">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="6054.1663" y="577.438">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="5806.2205" y="593.1675">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="5806.2205" y="608.897">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="5806.2205" y="624.6265">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="5806.2205" y="640.356">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="5806.2205" y="656.0854">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="5806.2205" y="671.8149">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="5914.0355" y="671.8149">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="5806.2205" y="687.5444">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="5806.2205" y="703.2739">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="5806.2205" y="719.0034">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="5806.2205" y="734.7329">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="5806.2205" y="750.4624">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="5806.2205" y="766.1919">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5643.3271" x2="5643.3271" y1="7757.0449" y2="7821.7744"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5643.3271" x2="1023.2666" y1="7821.7744" y2="7821.7744"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1023.2666" x2="1023.2666" y1="7821.7744" y2="7856.7744"/><polygon fill="#888888" points="1023.2666,7856.7744,1027.2666,7847.7744,1023.2666,7851.7744,1019.2666,7847.7744,1023.2666,7856.7744" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="5542.8046" y="7806.6387">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5623.3271" x2="5623.3271" y1="7207.4834" y2="7232.4834"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5623.3271" x2="1014.2666" y1="7232.4834" y2="7232.4834"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1014.2666" x2="1014.2666" y1="7232.4834" y2="7821.7744"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1014.2666" x2="1013.2666" y1="7821.7744" y2="7821.7744"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1013.2666" x2="1013.2666" y1="7821.7744" y2="7856.7744"/><polygon fill="#888888" points="1013.2666,7856.7744,1017.2666,7847.7744,1013.2666,7851.7744,1009.2666,7847.7744,1013.2666,7856.7744" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="913.7441" y="7539.7227">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="5643.3271" x2="5643.3271" y1="720