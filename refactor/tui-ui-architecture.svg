4688"/><line style="stroke:#000000;stroke-width:1;" x1="6032.6419" x2="6032.6419" y1="162.5264" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="6141.263" x2="6141.263" y1="162.5264" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="6186.8646" x2="6186.8646" y1="162.5264" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="6244.2093" x2="6244.2093" y1="162.5264" y2="398.4688"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="6032.6419" y="413.0625">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="6032.6419" y="428.792">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="6032.6419" y="444.5215">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="6032.6419" y="460.251">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="6032.6419" y="475.9805">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="6032.6419" y="491.71">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="6032.6419" y="507.4395">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="6032.6419" y="523.1689">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="6159.2205" y="523.1689">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="6032.6419" y="538.8984">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="6113.5872" y="538.8984">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="6280.5877" y="538.8984">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="6032.6419" y="554.6279">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="6032.6419" y="570.3574">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="6032.6419" y="586.0869">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="6032.6419" y="601.8164">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="6032.6419" y="617.5459">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="6032.6419" y="633.2754">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="6140.4569" y="633.2754">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="6032.6419" y="649.0049">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="6032.6419" y="664.7344">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="6032.6419" y="680.4639">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="6032.6419" y="696.1934">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="6032.6419" y="711.9229">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="6032.6419" y="727.6523">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="2547.5638" x2="2547.5638" y1="8302.0078" y2="8376.7373"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="2547.5638" x2="1013.2666" y1="8376.7373" y2="8376.7373"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1013.2666" x2="1013.2666" y1="8376.7373" y2="8411.7373"/><polygon fill="#888888" points="1013.2666,8411.7373,1017.2666,8402.7373,1013.2666,8406.7373,1009.2666,8402.7373,1013.2666,8411.7373" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="2447.0413" y="8351.6016">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6023.201" x2="6023.201" y1="7752.4463" y2="7767.4463"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6023.201" x2="6149.7816" y1="7767.4463" y2="7767.4463"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6149.7816" x2="6149.7816" y1="7767.4463" y2="8396.7373"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6149.7816" x2="1364.1602" y1="8396.7373" y2="8396.7373"/><line style="stroke:#888888;stroke-