4.3375,7113.2197,5278.3375,7104.2197,5274.3375,7108.2197,5270.3375,7104.2197,5274.3375,7113.2197" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="141.8701" x="1922.188" y="4334.7568">writes lines + extmarks</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2688.7674" x2="2688.7674" y1="4230.1631" y2="4290.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2688.7674" x2="2796.0741" y1="4290.1631" y2="4290.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2796.0741" x2="2796.0741" y1="4290.1631" y2="4449.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2796.0741" x2="1290.7007" y1="4449.8926" y2="4449.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1290.7007" x2="1290.7007" y1="4449.8926" y2="6930.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1290.7007" x2="5327.0903" y1="6930.4902" y2="6930.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5327.0903" x2="5327.0903" y1="6930.4902" y2="7113.2197"/><polygon fill="#181818" points="5327.0903,7113.2197,5331.0903,7104.2197,5327.0903,7108.2197,5323.0903,7104.2197,5327.0903,7113.2197" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="141.8701" x="2650.2039" y="4334.7568">writes lines + extmarks</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2083.3488" x2="2083.3488" y1="4230.1631" y2="4290.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2083.3488" x2="1895.188" y1="4290.1631" y2="4290.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1895.188" x2="1895.188" y1="4290.1631" y2="4389.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1895.188" x2="1224.7007" y1="4389.8926" y2="4389.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1224.7007" x2="1224.7007" y1="4389.8926" y2="6990.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1224.7007" x2="5091.4965" y1="6990.4902" y2="6990.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5091.4965" x2="5091.4965" y1="6990.4902" y2="7085.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5091.4965" x2="5247.961" y1="7085.4902" y2="7085.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5247.961" x2="5247.961" y1="7085.4902" y2="7113.2197"/><polygon fill="#181818" points="5247.961,7113.2197,5251.961,7104.2197,5247.961,7108.2197,5243.961,7104.2197,5247.961,7113.2197" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="149.1699" x="1742.0181" y="4334.7568">writes per-block buffers</text><g class="legend" data-source-line="14"><rect fill="#DDDDDD" height="602.8809" rx="3" ry="3" style="stroke:#000000;stroke-width:1;" width="500.5742" x="6272.6164" y="8825.5557"/><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="139.6172" x="6277.6164" y="8844.1182">Target organization:</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="232.9893" x="6421.1711" y="8844.1182">`core` and `tui` are separate crates.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="451.0078" x="6277.6164" y="8861.0576">`core` has no terminal imports and no `crossterm` / `ui` dependency.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="262.6982" x="6277.6164" y="8877.9971">`tui` depends on `core` and `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="379.415" x="6277.6164" y="8894.9365">`ui` is a terminal UI primitives module inside `tui` (`tui::ui`);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="173.9404" x="6277.6164" y="8911.876">it depends on `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="390.4414" x="6277.6164" y="8928.8154">A GUI or web frontend uses `core` directly and ignores `ui`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6277.6164" y="8945.7549">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="153.7744" x="6277.6164" y="8962.6943">`Buffer` lives in `core`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="215.4277" x="6435.3283" y="8962.6943">It is pure data &#8212; lines, extmarks,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="435.4014" x="6277.6164" y="8979.6338">namespaces, undo. Zero terminal deps. Headless reads transcript</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="383.1338" x="6277.6164" y="8996.5732">content through the same surface as the TUI does. Parser</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="420.1572" x="6277.6164" y="9013.5127">*implementations* (markdown / diff / syntax / bash) stay in `tui`</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="381.2471" x="6277.6164" y="9030.4521">because they pull from `tui::content::highlight::*` (syntect,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="179.0879" x="6277.6164" y="9047.3916">inline markdown, diff LCS).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6277.6164" y="9064.3311">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="274.1895" x="6277.6164" y="9081.2705">Lua's drawing context is full, not partial.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="91.3145" x="6555.7433" y="9081.2705">Tool / dialog /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="423.5342" x="6277.6164" y="9098.21">statusline `render` callbacks receive a `Buffer` userdata with the</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9072" x="6277.6164" y="9115.1494">full Buffer API (set_lines / add_highlight / set_extmark / attach /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="488.7969" x="6277.6164" y="9132.0889">namespaces / virt-text). No `RenderCtx`-style enum-of-allowed-methods.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="406.793" x="6277.6164" y="9149.0283">Shipped Rust renderers (smelt.bash.render, smelt.diff.render,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="447.2959" x="6277.6164" y="9165.9678">smelt.syntax.render, smelt.notebook.render) sit on top of the Buffer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="251.7334" x="6277.6164" y="9182.9072">API as conveniences, not in front of it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6277.6164" y="9199.8467">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="377.1387" x="6277.6164" y="9216.7861">No tool/command/dialog/mode name matching in Rust.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="109.498" x="6658.6925" y="9216.7861">A `match name {</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="397.127" x="6277.6164" y="9233.7256">"bash" =&gt; &#8230; }` over a Lua-registered identifier is a bug. The</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="394.502" x="6277.6164" y="9250.665">registration table carries the metadata; Rust calls through it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6277.6164" y="9267.6045">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="249.3887" x="6277.6164" y="9284.5439">Plugin-author surface (P9.f-k, plan).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="161.7998" x="6530.9425" y="9284.5439">Namespaces are integer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="454.5625" x="6277.6164" y="9301.4834">handles minted by `smelt.api.create_namespace`. Extmark API is one</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="330.6748" x="6277.6164" y="9318.4229">keyset call mirroring nvim verbatim. Plugins live in</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="429.7617" x="6277.6164" y="9335.3623">`/.config/smelt/` AND project-local `&lt;cwd&gt;/.smelt/` (trust-gated).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="412.0635" x="6277.6164" y="9352.3018">Tool files auto-register on require. Prompt sections register as</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="401.96" x="6277.6164" y="9369.2412">closures (statusline pattern). Cell subscribers see (new, old);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="405.3779" x="6277.6164" y="9386.1807">built-in names typed. Provider middleware mutates request +</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9756" x="6277.6164" y="9403.1201">response. `require` searches workspace + user runtime before</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="417.6895" x="6277.6164" y="9420.0596">embedded fallback. Read-only tools opt into parallel execution.</text></g><?plantuml-src jNtfSXj9akP_F4Kissm4K3YgfcVBgY6MnYYAb3XDaJGUTVHo3KW02I2RYKniPe8KgbHhO_kZ_-zicyqRx2lC_vatwITP_zmzZWH0TlMiIcPL138Yu_3mspqS_sLPHBD5PD9edQyg4wVtZKPvdsJBg8WMPfn6PNbOLKKoMbNnwJZFhfCVO_D5qAMSHvFyCSbcPXgbPHoq5FagcnpbHHONvglW-IIUHgkqEicpwZnQn6RlDAlYOY_eiOp6zz4ilgxMQMoAU5n5sIoD6_Da4fjuiQpMPX4lHd5HrXzLytnIDXfLKj5hvI9EA_ENV_wpgQ9Y5bScAiRpfAB1LaLiccLLhFXZwovx6u-JCicpqaJPn1HHHPyZ6Y9D7cAJP6P___3gwFtfpV7HpUtLSNSnsTz_PShuVwpYR8oDSvUhuvF3evkBAsxkDXffF8inMZARLmr37Mva6NanYxBaHvwalxzlXkEyY8Syyx1Q9VI9bbV604GLcp7-NtPf0EqtZqgJvOO0jaXeaIPPBFEYafNJy-6uoCiIhKFJCqECDucNj11Qwfg7gVopqkHPRNx_CdT5puI6zhFTdffbaIoIYY1JcaK-MQM0K8bJa96R-DFlqyVMAneZgUfprIOuDEzemBmmZ_78J0l21q1iLTBGkgf9WjDFrxoyP9RHmvBNHG06J8TlLjDfN0pvg4eSXBpO9S2ULbZy4gSzYQg8KI5DihXic_XZjOYA-x9DWsI4WYKX79uJlkPTyuUu201Coo-xvdqSJTAuB0aR8zfBLKHPEIwI9Ovsp0klJ3KdZ9_DwIyT812xN1LJ6jZGaU7P3MrsajDfcikeAEC2Ew3ZI-C5lStuKEwR9XP619NHyKsIwPJ-b6jg_aWVHb4vRvcoYjQyKy2RnXZ5uuXWXYdMjDqq1IWNHiv1rzRlpmaFK-1YlxzFfuGn2R80G981AiREsvPfpuwkMmhairNqeZIJ8c8gvn4_CcodD5cRiAuYWYsg94e1zfiyJtdjKPhFJ8z6e0LNgv8d6HP0HJglSPIc8w9o07GSWyuYumwJTbFmaJqc5OEJ1i5SHZgOmyjJsa5S3VWuQR9eCXcu3G9YrAPdZDQgYiPpNee_R7h-a1HL1tjfTSqvaSuLh-se-ZZibCnvucorwEJJ3gqrVumd7UKmGDthUR9SnXDpjIeh8viYTaIh0jVfug2wyhGjZAWBeDf7W0a_b9FTw4dmZ4TvVg-FwS29Y8XugdnfyYbZai0154IG8EoYCtc8iuHe75YC0o7yO8B26qcb1qcRhEXqUkDyiI22wiaPzOYCOuOCuK15F58u6dQ6ypmqGtuiFNwYWVQmlJtppMiYgVzhVXwQ_84E9JA49v