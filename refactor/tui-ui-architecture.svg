;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="86.0933" x="1424.5531" y="306.6855">on_change cb</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1540.4867" y="306.6855">X</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1575.1195" y="306.6855">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="65.8315" x="1424.5531" y="322.415">cursor pos</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1529.5179" y="322.415">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1586.0883" y="322.415">X</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="73.0425" x="1424.5531" y="338.1445">scroll offset</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1529.5179" y="338.1445">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1586.0883" y="338.1445">X</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="94.5547" x="1424.5531" y="353.874">selection range</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1529.5179" y="353.874">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1586.0883" y="353.874">X</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="97.6523" x="1424.5531" y="369.6035">keymap overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1529.5179" y="369.6035">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1586.0883" y="369.6035">X</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="87.3311" x="1424.5531" y="385.333">scrollbar state</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1529.5179" y="385.333">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1586.0883" y="385.333">X</text><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="152.5264" y2="152.5264"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="168.2559" y2="168.2559"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="183.9854" y2="183.9854"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="199.7148" y2="199.7148"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="215.4443" y2="215.4443"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="231.1738" y2="231.1738"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="246.9033" y2="246.9033"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="262.6328" y2="262.6328"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="278.3623" y2="278.3623"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="294.0918" y2="294.0918"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="309.8213" y2="309.8213"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="325.5508" y2="325.5508"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="341.2803" y2="341.2803"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="357.0098" y2="357.0098"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="372.7393" y2="372.7393"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1632.4642" y1="388.4688" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="1420.8969" x2="1420.8969" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="1529.5179" x2="1529.5179" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="1575.1195" x2="1575.1195" y1="152.5264" y2="388.4688"/><line style="stroke:#000000;stroke-width:1;" x1="1632.4642" x2="1632.4642" y1="152.5264" y2="388.4688"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="1420.8969" y="403.0625">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="1420.8969" y="418.792">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="1420.8969" y="434.5215">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="1420.8969" y="450.251">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="1420.8969" y="465.9805">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="1420.8969" y="481.71">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="1420.8969" y="497.4395">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="1420.8969" y="513.1689">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="1547.4755" y="513.1689">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="1420.8969" y="528.8984">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="1501.8422" y="528.8984">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="1668.8427" y="528.8984">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="1420.8969" y="544.6279">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="1420.8969" y="560.3574">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="1420.8969" y="576.0869">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="1420.8969" y="591.8164">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="1420.8969" y="607.5459">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="1420.8969" y="623.2754">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="1528.7118" y="623.2754">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="1420.8969" y="639.0049">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="1420.8969" y="654.7344">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="1420.8969" y="670.4639">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="1420.8969" y="686.1934">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="1420.8969" y="701.9229">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="1420.8969" y="717.6523">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3503.8291" x2="3503.8291" y1="4819.8315" y2="5991.3564"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3503.8291" x2="1961.5051" y1="5991.3564" y2="5991.3564"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1961.5051" x2="1961.5051" y1="5991.3564" y2="6026.3564"/><polygon fill="#888888" points="1961.5051,6026.3564,1965.5051,6017.3564,1961.5051,6021.3564,1957.5051,6017.3564,1961.5051,6026.3564" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="3403.3067" y="5966.2207">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4855.1423