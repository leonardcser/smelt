2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="292.5649" x2="292.5649" y1="162.5264" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="349.9097" x2="349.9097" y1="162.5264" y2="398.4688"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="138.3423" y="413.0625">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="138.3423" y="428.792">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="138.3423" y="444.5215">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="138.3423" y="460.251">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="138.3423" y="475.9805">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="138.3423" y="491.71">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="138.3423" y="507.4395">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="138.3423" y="523.1689">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="264.9209" y="523.1689">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="138.3423" y="538.8984">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="219.2876" y="538.8984">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="386.2881" y="538.8984">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="138.3423" y="554.6279">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="138.3423" y="570.3574">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="138.3423" y="586.0869">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="138.3423" y="601.8164">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="138.3423" y="617.5459">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="138.3423" y="633.2754">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="246.1572" y="633.2754">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="138.3423" y="649.0049">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="138.3423" y="664.7344">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="138.3423" y="680.4639">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="138.3423" y="696.1934">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="138.3423" y="711.9229">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="138.3423" y="727.6523">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3741.6729" x2="3741.6729" y1="7835.0684" y2="7919.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3741.6729" x2="586.2236" y1="7919.7979" y2="7919.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="586.2236" x2="586.2236" y1="7919.7979" y2="7944.7979"/><polygon fill="#888888" points="586.2236,7944.7979,590.2236,7935.7979,586.2236,7939.7979,582.2236,7935.7979,586.2236,7944.7979" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="3641.1504" y="7884.6621">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3721.6729" x2="3721.6729" y1="7285.5068" y2="7300.5068"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3721.6729" x2="669.7461" y1="7300.5068" y2="7300.5068"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="669.7461" x2="669.7461" y1="7300.5068" y2="7899.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="669.7461" x2="566.2236" y1="7899.7979" y2="7899.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="566.2236" x2="566.2236" y1="7899.7979" y2="7944.7979"/><polygon fill="#888888" points="566.2236,7944.7979,570.2236,7935.7979,566.2236,7939.7979,562.2236,7935.7979,566.2236,7944.7979" style="stroke:#88888