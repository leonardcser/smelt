le="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="162.5264" y2="162.5264"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="178.2559" y2="178.2559"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="193.9854" y2="193.9854"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="209.7148" y2="209.7148"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="225.4443" y2="225.4443"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="241.1738" y2="241.1738"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="256.9033" y2="256.9033"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="272.6328" y2="272.6328"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="288.3623" y2="288.3623"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="304.0918" y2="304.0918"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="319.8213" y2="319.8213"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="335.5508" y2="335.5508"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="351.2803" y2="351.2803"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="367.0098" y2="367.0098"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="382.7393" y2="382.7393"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6277.0573" y1="398.4688" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="6065.4899" x2="6065.4899" y1="162.5264" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="6174.111" x2="6174.111" y1="162.5264" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="6219.7126" x2="6219.7126" y1="162.5264" y2="398.4688"/><line style="stroke:#000000;stroke-width:1;" x1="6277.0573" x2="6277.0573" y1="162.5264" y2="398.4688"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="6065.4899" y="413.0625">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="6065.4899" y="428.792">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="6065.4899" y="444.5215">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="6065.4899" y="460.251">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="6065.4899" y="475.9805">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="6065.4899" y="491.71">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="6065.4899" y="507.4395">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="6065.4899" y="523.1689">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="6192.0685" y="523.1689">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="6065.4899" y="538.8984">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="6146.4352" y="538.8984">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="6313.4357" y="538.8984">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="6065.4899" y="554.6279">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="6065.4899" y="570.3574">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="6065.4899" y="586.0869">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="6065.4899" y="601.8164">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="6065.4899" y="617.5459">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="6065.4899" y="633.2754">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="6173.3049" y="633.2754">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="6065.4899" y="649.0049">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="6065.4899" y="664.7344">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="6065.4899" y="680.4639">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="6065.4899" y="696.1934">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="6065.4899" y="711.9229">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="6065.4899" y="727.6523">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="2547.5638" x2="2547.5638" y1="8275.0684" y2="8349.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="2547.5638" x2="1013.2666" y1="8349.7979" y2="8349.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1013.2666" x2="1013.2666" y1="8349.7979" y2="8384.7979"/><polygon fill="#888888" points="1013.2666,8384.7979,1017.2666,8375.7979,1013.2666,8379.7979,1009.2666,8375.7979,1013.2666,8384.7979" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="2447.0413" y="8324.6621">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6023.201" x2="6023.201" y1="7725.5068" y2="7740.5068"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6023.201" x2="6149.7816" y1="7740.5068" y2="7740.5068"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6149.7816" x2="6149.7816" y1="7740.5068" y2="8369.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="6149.7816" x2="1364.1602" y1="8369.7979" y2="8369.7979"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="1364.1602" x2="1364.1602" y1="8369.7979" y2="8384.7979"/><polygon fill="#888888" points="1364.1602,8384.7979,1368.1602,8375.7979,1364.1602,8379.7979,1360.1602,8375.7979,1364.1602,8384.7979" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLe