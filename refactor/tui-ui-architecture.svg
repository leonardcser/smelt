oke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2083.3488" x2="1895.188" y1="4317.1025" y2="4317.1025"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1895.188" x2="1895.188" y1="4317.1025" y2="4416.832"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1895.188" x2="1224.7007" y1="4416.832" y2="4416.832"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1224.7007" x2="1224.7007" y1="4416.832" y2="7017.4297"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1224.7007" x2="5091.4965" y1="7017.4297" y2="7017.4297"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5091.4965" x2="5091.4965" y1="7017.4297" y2="7112.4297"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5091.4965" x2="5247.961" y1="7112.4297" y2="7112.4297"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5247.961" x2="5247.961" y1="7112.4297" y2="7140.1592"/><polygon fill="#181818" points="5247.961,7140.1592,5251.961,7131.1592,5247.961,7135.1592,5243.961,7131.1592,5247.961,7140.1592" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="149.1699" x="1742.0181" y="4361.6963">writes per-block buffers</text><g class="legend" data-source-line="14"><rect fill="#DDDDDD" height="602.8809" rx="3" ry="3" style="stroke:#000000;stroke-width:1;" width="500.5742" x="6239.7684" y="8852.4951"/><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="139.6172" x="6244.7684" y="8871.0576">Target organization:</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="232.9893" x="6388.3231" y="8871.0576">`core` and `tui` are separate crates.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="451.0078" x="6244.7684" y="8887.9971">`core` has no terminal imports and no `crossterm` / `ui` dependency.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="262.6982" x="6244.7684" y="8904.9365">`tui` depends on `core` and `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="379.415" x="6244.7684" y="8921.876">`ui` is a terminal UI primitives module inside `tui` (`tui::ui`);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="173.9404" x="6244.7684" y="8938.8154">it depends on `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="390.4414" x="6244.7684" y="8955.7549">A GUI or web frontend uses `core` directly and ignores `ui`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6244.7684" y="8972.6943">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="153.7744" x="6244.7684" y="8989.6338">`Buffer` lives in `core`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="215.4277" x="6402.4803" y="8989.6338">It is pure data &#8212; lines, extmarks,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="435.4014" x="6244.7684" y="9006.5732">namespaces, undo. Zero terminal deps. Headless reads transcript</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="383.1338" x="6244.7684" y="9023.5127">content through the same surface as the TUI does. Parser</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="420.1572" x="6244.7684" y="9040.4521">*implementations* (markdown / diff / syntax / bash) stay in `tui`</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="381.2471" x="6244.7684" y="9057.3916">because they pull from `tui::content::highlight::*` (syntect,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="179.0879" x="6244.7684" y="9074.3311">inline markdown, diff LCS).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6244.7684" y="9091.2705">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="274.1895" x="6244.7684" y="9108.21">Lua's drawing context is full, not partial.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="91.3145" x="6522.8953" y="9108.21">Tool / dialog /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="423.5342" x="6244.7684" y="9125.1494">statusline `render` callbacks receive a `Buffer` userdata with the</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9072" x="6244.7684" y="9142.0889">full Buffer API (set_lines / add_highlight / set_extmark / attach /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="488.7969" x="6244.7684" y="9159.0283">namespaces / virt-text). No `RenderCtx`-style enum-of-allowed-methods.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="406.793" x="6244.7684" y="9175.9678">Shipped Rust renderers (smelt.bash.render, smelt.diff.render,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="447.2959" x="6244.7684" y="9192.9072">smelt.syntax.render, smelt.notebook.render) sit on top of the Buffer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="251.7334" x="6244.7684" y="9209.8467">API as conveniences, not in front of it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6244.7684" y="9226.7861">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="377.1387" x="6244.7684" y="9243.7256">No tool/command/dialog/mode name matching in Rust.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="109.498" x="6625.8446" y="9243.7256">A `match name {</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="397.127" x="6244.7684" y="9260.665">"bash" =&gt; &#8230; }` over a Lua-registered identifier is a bug. The</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="394.502" x="6244.7684" y="9277.6045">registration table carries the metadata; Rust calls through it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6244.7684" y="9294.5439">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="249.3887" x="6244.7684" y="9311.4834">Plugin-author surface (P9.f-k, plan).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="161.7998" x="6498.0946" y="9311.4834">Namespaces are integer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="454.5625" x="6244.7684" y="9328.4229">handles minted by `smelt.api.create_namespace`. Extmark API is one</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="330.6748" x="6244.7684" y="9345.3623">keyset call mirroring nvim verbatim. Plugins live in</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="429.7617" x="6244.7684" y="9362.3018">`/.config/smelt/` AND project-local `&lt;cwd&gt;/.smelt/` (trust-gated).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="412.0635" x="6244.7684" y="9379.2412">Tool files auto-register on require. Prompt sections register as</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="401.96" x="6244.7684" y="9396.1807">closures (statusline pattern). Cell subscribers see (new, old);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="405.3779" x="6244.7684" y="9413.1201">built-in names typed. Provider middleware mutates request +</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9756" x="6244.7684" y="9430.0596">response. `require` searches workspace + user runtime before</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="417.6895" x="6244.7684" y="9446.999">embedded fallback. Read-only tools opt into parallel execution.</text></g><?plantuml-src jNtfSXj9akP_F4Kissm4K3YgfsVRgY6MnYYAb3XDYJGUTVHo3KW02I2RYKnC7gHOfLhRN_r_PzTits1VOVxFlaa_oVhdxd4a0B9hTbGogoAG4Hc7Xz_kuVXFwo9Qh2AJHezvNPaulMkrohiaMqT5j3BJD2hBmwegaabTnQVJFBjAVepDLq6NSXdDyeSaMvXvb9Pnq5BaTJOxoeiiBiplW-UpU1xLQNMIPzN7Q1MRlTEiYekzeCSwcjv5Y_YgUanZKyJJAieMQTnQ9hFOnAjrzMXMyMeI5sNpKRNCPsMhLIKLlLQkuhGoV_tl_yjKKR68AnCLqsLIqM1r4PjsMHKrV-pSPc_ZQL8cULQQA9kP8gheSqH3fCbzR9BCxEyVNXwzFxq-Fhg-kJpkhsRx-wzC6Vzp7MTJR9oxN1wV71vTdrzoSx_LIkD5ZD6InR9g6UfmBSl8YqMK9J_o9CFzVJEUvaKyvfd7LPtG9rfU6GCGLMoc-7_Pfm6qtp8gJPOR0jWgeKMQPBNEYqfMJi_7qo8lIxIEpS2CCTuiNjD2QAcFF4pbdvKcpnhp-vUvAtecDBIVxURKh8jabLG4cTAiybcT0a8bJa56RkFFS4WVEwzeZAHgpjMOuD2yem7pmZp44pCl21y0iRgaeNLLimIddpxoyf95HWzBNXS1630TlwddyxWOyr6LE0XviK-0FQsm-3LEUnPL4QD2ccHnsJNnfseL5NTbbmR920LBGZWy9tpD--PFSH40c9PVzitxE9gbSLaIDaQqbwg8id9Q96iSxPGNNfbgIHY_MD9VEa0WTbaNSnhOq97XsJLjTfRJQPgBg2ZZ0ZkWuqlZ5RtD-53kcpOMHWILqV7DalcS_fIFrFo9FaoYSjanPHKzyau1RnfZ4ayZWXccUAJjfYb0kJ9o3hgsuN19U9W25uV3VJebZ4cG1G2I350nTjwkJ7jsTDLH89_LqOlIp8g8gPn7_CImdTDaNSAwYWYsg98e1TYlyppbjKTflZ036e4MNDKbJp8kW8fqNjCeJ