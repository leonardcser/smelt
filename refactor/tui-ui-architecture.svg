-weight="bold" lengthAdjust="spacing" textLength="139.6172" x="5963.7747" y="6445.6768">Target organization:</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="232.9893" x="6107.3294" y="6445.6768">`core` and `tui` are separate crates.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="451.0078" x="5963.7747" y="6462.6162">`core` has no terminal imports and no `crossterm` / `ui` dependency.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="262.6982" x="5963.7747" y="6479.5557">`tui` depends on `core` and `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="379.415" x="5963.7747" y="6496.4951">`ui` is a terminal UI primitives module inside `tui` (`tui::ui`);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="173.9404" x="5963.7747" y="6513.4346">it depends on `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="390.4414" x="5963.7747" y="6530.374">A GUI or web frontend uses `core` directly and ignores `ui`.</text></g><?plantuml-src jJtRSXl9TU_uYWwtoW8eN7PjPqk1iAoY842YJP4i4jnTEqg1Wva6qEPW1fwUuKMhhVAJt-EaAd-GNyXxyYVx9JcNlWq0ad9PKjaIPlfCNqwV-pdT-q_h8bgi8f56ztbL2fbUDnhwMcNhg8XM8auZhG_Bib2pgfH7SPvTg0zIV1s0w6MKvBSgMuXvb6ePj1HvbIN3lCXa8RuDtYTo7bLfESwpyYHQIR5tb9Mos0iWrb5y7ItaHNcVIb78k8ooHIeRIvL88LVhybwiv6ec2rr_LIxpH3SQfIhXCxsIQIb--Sj_YZ8g5h8KKH4lLGcTLOKKJLqM5VrilSzUorXfbMTQH5aYYgY4tn5qaQeRALGczlSFpuTlZoQZuUJoVDHT9VlxBuMMVwva5kF22UHyD3uSJaxFgRdRQAHo8R4tjLYM3G404vv6NYoYJ7sWGVhx--8gpWjvHIDVbPM2Np0zBH4HfHGn_gsxq861MqPQPBa0XAqKJ5AerJelIfuvlB-AYrnhRBqIFN65_ILo3HE1gTvJDwL_fqMUrSRt7nCeGYhesezsUIJMXLgf4Z2ZnIfFgXGnf74NkESc_jFlmy_MI-X3bVMnQWCSYZVGOLw8MpaJymBe0J5MQUZQp2fHkFlfFKrFBJ9ugMbUtGQ2CeuRZMVYky_n1_evlZmacf5P2KEBony_Mz-6fiLUKK7VAzbBgwX7HDeJeddv8t8WC0eHx5AAssKEg0LS59rvH5Icgm9-