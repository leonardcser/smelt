t="spacing" textLength="223.2549" x="3800.4063" y="4588.7842">event_rx: Receiver&lt;EngineEvent&gt;</text><line style="stroke:#181818;stroke-width:1;" x1="3795.4063" x2="4028.6611" y1="4596.1611" y2="4596.1611"/><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="194.6943" x="3800.4063" y="4613.7236">The ONLY way frontends talk</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="161.2666" x="3800.4063" y="4630.6631">to engine. No trait impls,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="170.0439" x="3800.4063" y="4647.6025">no callbacks, no UI types.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="176.6133" x="3800.4063" y="4664.542">No engine-side state leaks</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="128.1123" x="3800.4063" y="4681.4814">(no `processes`, no</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="155.4561" x="3800.4063" y="4698.4209">`runtime_approvals`, no</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="159.7832" x="3800.4063" y="4715.3604">`permissions`) &#8212; all that</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="130.7373" x="3800.4063" y="4732.2998">lives in core::* now.</text></g><!--class EngineConfig--><g class="entity" data-qualified-name="ENG.EngineConfig" data-source-line="516" id="ent0080"><rect fill="#F1F1F1" height="32" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="121.1475" x="3653.2588" y="4610.25"/><ellipse cx="3668.2588" cy="4626.25" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M3670.7319,4632.3931 Q3670.1509,4632.6919 3669.5117,4632.8413 Q3668.8726,4632.9907 3668.167,4632.9907 Q3665.6602,46