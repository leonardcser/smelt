5449"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1672.5575" x2="2123.3055" y1="4112.5449" y2="4112.5449"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2123.3055" x2="2123.3055" y1="4112.5449" y2="4212.5449"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2123.3055" x2="2272.1756" y1="4212.5449" y2="4212.5449"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2272.1756" x2="2272.1756" y1="4212.5449" y2="4292.2744"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2272.1756" x2="1172.1392" y1="4292.2744" y2="4292.2744"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1172.1392" x2="1172.1392" y1="4292.2744" y2="6452.4668"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1172.1392" x2="5327.1039" y1="6452.4668" y2="6452.4668"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5327.1039" x2="5327.1039" y1="6452.4668" y2="6595.1963"/><polygon fill="#181818" points="5327.1039,6595.1963,5331.1039,6586.1963,5327.1039,6590.1963,5323.1039,6586.1963,5327.1039,6595.1963" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="141.8701" x="2126.3055" y="4237.1387">writes lines + extmarks</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2267.4709" x2="2267.4709" y1="4092.5449" y2="4192.5449"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2267.4709" x2="2597.2157" y1="4192.5449" y2="4192.5449"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2597.2157" x2="2597.2157" y1="4192.5449" y2="4312.2744"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="2597.2157" x2="1194.1392" y1="4312.2744" y2="4312.2744"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1194.1392" x2="1194.1392" y1="4312.2744" y2="6432.4668"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="1194.1392" x2="5379.8568" y1="6432.4668" y2="6432.4668"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5379.8568" x2="5379.8568" y1="6432.4668" y2="6595.1963"/><polygon fill="#181818" points="5379.8568,6595.1963,5383.8568,6586.1963,5379.8568,6590.1963,5375.8568,6586.1963,5379.8568,6595.1963" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="149.1699" x="2444.0457" y="4237.1387">writes per-block buffers</text><g class="legend" data-source-line="14"><rect fill="#DDDDDD" height="569.002" rx="3" ry="3" style="stroke:#000000;stroke-width:1;" width="500.5742" x="6223.6253" y="8297.5322"/><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="139.6172" x="6228.6253" y="8316.0947">Target organization:</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="232.9893" x="6372.18" y="8316.0947">`core` and `tui` are separate crates.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="451.0078" x="6228.6253" y="8333.0342">`core` has no terminal imports and no `crossterm` / `ui` dependency.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="262.6982" x="6228.6253" y="8349.9736">`tui` depends on `core` and `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="379.415" x="6228.6253" y="8366.9131">`ui` is a terminal UI primitives module inside `tui` (`tui::ui`);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="173.9404" x="6228.6253" y="8383.8525">it depends on `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="390.4414" x="6228.6253" y="8400.792">A GUI or web frontend uses `core` directly and ignores `ui`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6228.6253" y="8417.7314">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="153.7744" x="6228.6253" y="8434.6709">`Buffer` lives in `core`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="215.4277" x="6386.3372" y="8434.6709">It is pure data &#8212; lines, extmarks,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="435.4014" x="6228.6253" y="8451.6104">namespaces, undo. Zero terminal deps. Headless reads transcript</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="383.1338" x="6228.6253" y="8468.5498">content through the same surface as the TUI does. Parser</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="420.1572" x="6228.6253" y="8485.4893">*implementations* (markdown / diff / syntax / bash) stay in `tui`</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="381.2471" x="6228.6253" y="8502.4287">because they pull from `tui::content::highlight::*` (syntect,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="179.0879" x="6228.6253" y="8519.3682">inline markdown, diff LCS).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6228.6253" y="8536.3076">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="274.1895" x="6228.6253" y="8553.2471">Lua's drawing context is full, not partial.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="91.3145" x="6506.7523" y="8553.2471">Tool / dialog /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="423.5342" x="6228.6253" y="8570.1865">statusline `render` callbacks receive a `Buffer` userdata with the</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9072" x="6228.6253" y="8587.126">full Buffer API (set_lines / add_highlight / set_extmark / attach /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="488.7969" x="6228.6253" y="8604.0654">namespaces / virt-text). No `RenderCtx`-style enum-of-allowed-methods.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="406.793" x="6228.6253" y="8621.0049">Shipped Rust renderers (smelt.bash.render, smelt.diff.render,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="447.2959" x="6228.6253" y="8637.9443">smelt.syntax.render, smelt.notebook.render) sit on top of the Buffer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="251.7334" x="6228.6253" y="8654.8838">API as conveniences, not in front of it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6228.6253" y="8671.8232">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="377.1387" x="6228.6253" y="8688.7627">No tool/command/dialog/mode name matching in Rust.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="109.498" x="6609.7015" y="8688.7627">A `match name {</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="397.127" x="6228.6253" y="8705.7021">"bash" =&gt; &#8230; }` over a Lua-registered identifier is a bug. The</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="394.502" x="6228.6253" y="8722.6416">registration table carries the metadata; Rust calls through it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="6228.6253" y="8739.5811">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="249.9834" x="6228.6253" y="8756.5205">Plugin-author surface (P9.f-h, plan).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="161.7998" x="6482.5462" y="8756.5205">Namespaces are integer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="457.8506" x="6228.6253" y="8773.46">handles minted by `smelt.api.create_namespace(name)`. Extmark API</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="422.4746" x="6228.6253" y="8790.3994">is one keyset call mirroring nvim verbatim plus smelt extensions</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="433.7266" x="6228.6253" y="8807.3389">(yank, on_click). Plugins live in `/.config/smelt/` AND project-local</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="428.5723" x="6228.6253" y="8824.2783">`&lt;cwd&gt;/.smelt/` (trust-gated). Tool files auto-register on require.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="412.0635" x="6228.6253" y="8841.2178">System-prompt sections register as closures, mirror statusline</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="100.7617" x="6228.6253" y="8858.1572">source pattern.</text></g><?plantuml-src jNtfSYD7akP_F4KiPJO5i718qxCoDOggDHP8Ld6QHT9uwEZb6f38J00vJ6HYyo09gJGsl_h_76Rp1liAyt_sJVf9rZ_tk180sUgTKfb9138Y8pmy_7QFm7zR5S5y6QWqMETrfUBqljKgxvDi5HJ1KeLfK9Q7LLKaqxgAJyCykqv-YjMNNfTo4KJvOvBDrIn8