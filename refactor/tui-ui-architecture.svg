"348.3608"/><line style="stroke:#000000;stroke-width:1;" x1="5476.8057" x2="5688.3731" y1="364.0903" y2="364.0903"/><line style="stroke:#000000;stroke-width:1;" x1="5476.8057" x2="5688.3731" y1="379.8198" y2="379.8198"/><line style="stroke:#000000;stroke-width:1;" x1="5476.8057" x2="5688.3731" y1="395.5493" y2="395.5493"/><line style="stroke:#000000;stroke-width:1;" x1="5476.8057" x2="5688.3731" y1="411.2788" y2="411.2788"/><line style="stroke:#000000;stroke-width:1;" x1="5476.8057" x2="5688.3731" y1="427.0083" y2="427.0083"/><line style="stroke:#000000;stroke-width:1;" x1="5476.8057" x2="5476.8057" y1="191.0659" y2="427.0083"/><line style="stroke:#000000;stroke-width:1;" x1="5585.4268" x2="5585.4268" y1="191.0659" y2="427.0083"/><line style="stroke:#000000;stroke-width:1;" x1="5631.0283" x2="5631.0283" y1="191.0659" y2="427.0083"/><line style="stroke:#000000;stroke-width:1;" x1="5688.3731" x2="5688.3731" y1="191.0659" y2="427.0083"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="381.8813" x="5476.8057" y="441.6021">| border / title  |  &#8212;     |   &#8212;    |  ' on LayoutTree (any container)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="348.5688" x="5476.8057" y="457.3315">| panel dividers  |  &#8212;     |   &#8212;    |  ' on LayoutTree (parent)</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="5476.8057" y="473.061">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="300.4346" x="5476.8057" y="488.7905">Same Buffer can have 0..N Windows looking at it</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.6128" x="5476.8057" y="504.52">with independent cursors/scrolls. No BufferView</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="78.8125" x="5476.8057" y="520.2495">middle layer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="5476.8057" y="535.979">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5786" x="5476.8057" y="551.7085">Composing widgets</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="135.4019" x="5603.3843" y="551.7085">: a "dialog with a list +</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="77.2891" x="5476.8057" y="567.438">text input" is</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.0005" x="5557.751" y="567.438">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="5724.7515" y="567.438">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="5476.8057" y="583.1675">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="5476.8057" y="598.897">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="5476.8057" y="614.6265">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="5476.8057" y="630.356">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="5476.8057" y="646.0854">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="5476.8057" y="661.8149">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="5584.6206" y="661.8149">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="5476.8057" y="677.5444">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="5476.8057" y="693.2739">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="5476.8057" y="709.0034">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="5476.8057" y="724.7329">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="5476.8057" y="740.4624">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="5476.8057" y="756.1919">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="835.6009" x2="835.6009" y1="7161.5801" y2="7251.3096"/><polygon fill="#888888" points="835.6009,7251.3096,839.6009,7242.3096,835.6009,7246.3096,831.6009,7242.3096,835.6009,7251.3096" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="735.0785" y="7201.1738">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="748.4386" x2="748.4386" y1="6612.0186" y2="6627.0186"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="748.4386" x2="125.5225" y1="6627.0186" y2="6627.0186"/><line style="stroke:#888888;str