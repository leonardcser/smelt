stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5171.6842" x2="5171.6842" y1="4149.001" y2="6118.8271"/><polygon fill="#181818" points="5171.6842,6118.8271,5175.6842,6109.8271,5171.6842,6113.8271,5167.6842,6109.8271,5171.6842,6118.8271" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="141.8701" x="4619.4853" y="4113.8652">writes lines + extmarks</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="4345.1416" x2="4345.1416" y1="3929.2715" y2="4049.2715"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="4345.1416" x2="4447.6152" y1="4049.2715" y2="4049.2715"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="4447.6152" x2="4447.6152" y1="4049.2715" y2="4169.001"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="4447.6152" x2="4874.194" y1="4169.001" y2="4169.001"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="4874.194" x2="4874.194" y1="4169.001" y2="6006.0977"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="4874.194" x2="5118.9314" y1="6006.0977" y2="6006.0977"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="5118.9314" x2="5118.9314" y1="6006.0977" y2="6118.8271"/><polygon fill="#181818" points="5118.9314,6118.8271,5122.9314,6109.8271,5118.9314,6113.8271,5114.9314,6109.8271,5118.9314,6118.8271" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="149.1699" x="4294.4453" y="4113.8652">writes per-block buffers</text><g class="legend" data-source-line="14"><rect fill="#DDDDDD" height="433.4863" rx="3" ry="3" style="stroke:#000000;stroke-width:1;" width="500.5742" x="5358.1128" y="7692.0674"/><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="139.6172" x="5363.1128" y="7710.6299">Target organization:</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="232.9893" x="5506.6675" y="7710.6299">`core` and `tui` are separate crates.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="451.0078" x="5363.1128" y="7727.5693">`core` has no terminal imports and no `crossterm` / `ui` dependency.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="262.6982" x="5363.1128" y="7744.5088">`tui` depends on `core` and `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="379.415" x="5363.1128" y="7761.4482">`ui` is a terminal UI primitives module inside `tui` (`tui::ui`);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="173.9404" x="5363.1128" y="7778.3877">it depends on `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="390.4414" x="5363.1128" y="7795.3271">A GUI or web frontend uses `core` directly and ignores `ui`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="5363.1128" y="7812.2666">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="153.7744" x="5363.1128" y="7829.2061">`Buffer` lives in `core`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="215.4277" x="5520.8247" y="7829.2061">It is pure data &#8212; lines, extmarks,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="435.4014" x="5363.1128" y="7846.1455">namespaces, undo. Zero terminal deps. Headless reads transcript</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="383.1338" x="5363.1128" y="7863.085">content through the same surface as the TUI does. Parser</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="420.1572" x="5363.1128" y="7880.0244">*implementations* (markdown / diff / syntax / bash) stay in `tui`</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="381.2471" x="5363.1128" y="7896.9639">because they pull from `tui::content::highlight::*` (syntect,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="179.0879" x="5363.1128" y="7913.9033">inline markdown, diff LCS).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="5363.1128" y="7930.8428">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="274.1895" x="5363.1128" y="7947.7822">Lua's drawing context is full, not partial.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="91.3145" x="5641.2398" y="7947.7822">Tool / dialog /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="423.5342" x="5363.1128" y="7964.7217">statusline `render` callbacks receive a `Buffer` userdata with the</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9072" x="5363.1128" y="7981.6611">full Buffer API (set_lines / add_highlight / set_extmark / attach /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="488.7969" x="5363.1128" y="7998.6006">namespaces / virt-text). No `RenderCtx`-style enum-of-allowed-methods.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="406.793" x="5363.1128" y="8015.54">Shipped Rust renderers (smelt.bash.render, smelt.diff.render,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="447.2959" x="5363.1128" y="8032.4795">smelt.syntax.render, smelt.notebook.render) sit on top of the Buffer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="251.7334" x="5363.1128" y="8049.4189">API as conveniences, not in front of it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="5363.1128" y="8066.3584">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="377.1387" x="5363.1128" y="8083.2979">No tool/command/dialog/mode name matching in Rust.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="109.498" x="5744.189" y="8083.2979">A `match name {</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="397.127" x="5363.1128" y="8100.2373">"bash" =&gt; &#8230; }` over a Lua-registered identifier is a bug. The</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="394.502" x="5363.1128" y="8117.1768">registration table carries the metadata; Rust calls through it.</text></g><?plantuml-src jNtfRYD9akP_FeMl2fWabJogTsOBjKnL0afAojIqKX8ageuUBQWWwIHZ58pWn269LLd0_Eh_Sm3p1lCA-t_tJVf9nZupluAaLDcOh4HtYVJRpUqsS-V_MENHV1cf95fdLQbqSjze5FTnkehoQAacILGKXsMPn-EgrAUJBBsEVzRgww19iOYcsMESpjKiIWeTrEHPbKu7MPxgN7qJb4_rBAgIyYHBo_DegTNUQLhgV2zeiOeczz5SNvVhHAjSJyeedIUwiOYdMkdbgbohfLwETLxKYyf5DYqQZJ8kgLknr4cf_lBF_wxAA9_hKaNvP16ND5YLQzKiohpYZwtRz4XFuYBEqa95wLJbKKcV8neYYH-qYbErltzuDVXmEZmU36-kZhlBwVx-6rNeVwfqEi76kSdLySdXO7XnnTNTHYFHSutHulcYR2XgC9HbPFayIkEVUPB-_hwwcsIvlkEPxyegfa-ql4834ALM4_otwD80fjqYAbIQAGBOCgP5gdYvol9ILaxbTvCyAmhKtgcUkiDuKxsYXT1IrpnCwSiAbQMr-NrdRegMCGtjPxivLQiyNiObGQPGosnQ9O1GWLEGaPluq-_JnzOR6YCkwtFL9ZXKxsd0B5UFUgncEU4385OLDBHPrJJ6wIThNbuyJwcmu7KHW07JktVLRARpEpwg0WSX7Ri4sDCIYr_XjATH6J4g976gYxRIJ-Kook-BDWsI4WeMX70e9tpDkkfFEWy0JCilkkg3ZgQ9BWh2neZsKkPHMapoU8MZdV32IrK