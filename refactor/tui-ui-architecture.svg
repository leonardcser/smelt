:  Sender&lt;UiCommand&gt;</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="223.2549" x="5560.9088" y="7510.0278">event_rx: Receiver&lt;EngineEvent&gt;</text><line style="stroke:#181818;stroke-width:1;" x1="5555.9088" x2="5789.1637" y1="7517.4048" y2="7517.4048"/><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="194.6943" x="5560.9088" y="7534.9673">The ONLY way frontends talk</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="161.2666" x="5560.9088" y="7551.9067">to engine. No trait impls,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="170.0439" x="5560.9088" y="7568.8462">no callbacks, no UI types.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="176.6133" x="5560.9088" y="7585.7856">No engine-side state leaks</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="128.1123" x="5560.9088" y="7602.7251">(no `processes`, no</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="155.4561" x="5560.9088" y="7619.6646">`runtime_approvals`, no</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="159.7832" x="5560.9088" y="7636.604">`permissions`) &#8212; all that</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="130.7373" x="5560.9088" y="7653.5435">lives in core::* now.</text></g><!--class EngineConfig--><g class="entity" data-qualified-name="ENG.EngineConfig" data-source-line="605" id="ent0087"><rect fill="#F1F1F1" height="32" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="121.1475" x="6390.7799" y="7531.4937"/><ellipse cx="6405.7799" cy="7547.4937" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M6408.253