"2225.0418" y="528.8984">N Windows in one Overlay</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="31.0591" x="2392.0423" y="528.8984">. The</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="315.5991" x="2144.0965" y="544.6279">Overlay's `layout` is a Vbox/Hbox of `Leaf(WinId)`s,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="228.3379" x="2144.0965" y="560.3574">with chrome on the Vbox/Hbox itself.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="313.7964" x="2144.0965" y="576.0869">No compound-widget type, no group type &#8212; every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="304.5479" x="2144.0965" y="591.8164">composite shape is N&#215;Window inside an Overlay.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="2144.0965" y="607.5459">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.8149" x="2144.0965" y="623.2754">Rendering model</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="170.3774" x="2251.9115" y="623.2754">: event-driven + diff-based,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="256.915" x="2144.0965" y="639.0049">no dirty flag. The loop renders after every</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="288.501" x="2144.0965" y="654.7344">event; the compositor diffs current vs previous</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="279.9697" x="2144.0965" y="670.4639">Grid and flushes only changed cells. Idle CPU</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="275.5835" x="2144.0965" y="686.1934">is zero (loop parks). Things that change over</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="250.0659" x="2144.0965" y="701.9229">time (clock, spinner) drive a `Cell` from a</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="224.9102" x="2144.0965" y="717.6523">timer; the Cell setter wakes the loop.</text></g><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3961.2428" x2="3961.2428" y1="4828.3013" y2="5911.627"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3961.2428" x2="4064.7653" y1="5911.627" y2="5911.627"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4064.7653" x2="4064.7653" y1="5911.627" y2="5951.3564"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4064.7653" x2="3961.2428" y1="5951.3564" y2="5951.3564"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="3961.2428" x2="3961.2428" y1="5951.3564" y2="5986.3564"/><polygon fill="#888888" points="3961.2428,5986.3564,3965.2428,5977.3564,3961.2428,5981.3564,3957.2428,5977.3564,3961.2428,5986.3564" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="96.5225" x="3964.2428" y="5936.2207">uses wire types</text><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4131.9403" x2="4131.9403" y1="3195.4141" y2="3210.4141"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4131.9403" x2="4167.1836" y1="3210.4141" y2="3210.4141"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4167.1836" x2="4167.1836" y1="3210.4141" y2="5961.3564"/><line style="stroke:#888888;stroke-width:1;stroke-dasharray:7,7;" x1="4167.1836" x2="3971.2428" y1="5961.3564" y2="5961.3564"/><line style="stroke:#888888;stroke-wid