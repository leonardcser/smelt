7" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="141.8701" x="6354.4561" y="4284.7568">writes lines + extmarks</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7526.0052" x2="7526.0052" y1="4190.1631" y2="4250.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7526.0052" x2="7560.5954" y1="4250.1631" y2="4250.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7560.5954" x2="7560.5954" y1="4250.1631" y2="4369.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7560.5954" x2="6076.0013" y1="4369.8926" y2="4369.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6076.0013" x2="6076.0013" y1="4369.8926" y2="6550.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6076.0013" x2="6228.856" y1="6550.4902" y2="6550.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6228.856" x2="6228.856" y1="6550.4902" y2="6625.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6228.856" x2="6079.3778" y1="6625.4902" y2="6625.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6079.3778" x2="6079.3778" y1="6625.4902" y2="6673.2197"/><polygon fill="#181818" points="6079.3778,6673.2197,6083.3778,6664.2197,6079.3778,6668.2197,6075.3778,6664.2197,6079.3778,6673.2197" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="141.8701" x="7414.7253" y="4284.7568">writes lines + extmarks</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7387.7253" x2="7387.7253" y1="4190.1631" y2="4349.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7387.7253" x2="6054.0013" y1="4349.8926" y2="4349.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6054.0013" x2="6054.0013" y1="4349.8926" y2="6520.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6054.0013" x2="6053.0013" y1="6520.4902" y2="6520.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6053.0013" x2="6053.0013" y1="6520.4902" y2="6673.2197"/><polygon fill="#181818" points="6053.0013,6673.2197,6057.0013,6664.2197,6053.0013,6668.2197,6049.0013,6664.2197,6053.0013,6673.2197" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="141.8701" x="7241.8551" y="4284.7568">writes lines + extmarks</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7786.5951" x2="7786.5951" y1="4190.1631" y2="4240.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7786.5951" x2="7740.7653" y1="4240.1631" y2="4240.1631"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7740.7653" x2="7740.7653" y1="4240.1631" y2="4389.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="7740.7653" x2="6098.0013" y1="4389.8926" y2="4389.8926"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6098.0013" x2="6098.0013" y1="4389.8926" y2="6530.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6098.0013" x2="6262.2187" y1="6530.4902" y2="6530.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6262.2187" x2="6262.2187" y1="6530.4902" y2="6635.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6262.2187" x2="6105.7542" y1="6635.4902" y2="6635.4902"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" x1="6105.7542" x2="6105.7542" y1="6635.4902" y2="6673.2197"/><polygon fill="#181818" points="6105.7542,6673.2197,6109.7542,6664.2197,6105.7542,6668.2197,6101.7542,6664.2197,6105.7542,6673.2197" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="149.1699" x="7587.5954" y="4284.7568">writes per-block buffers</text><g class="legend" data-source-line="14"><rect fill="#DDDDDD" height="602.8809" rx="3" ry="3" style="stroke:#000000;stroke-width:1;" width="500.5742" x="8009.3789" y="8385.5557"/><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="139.6172" x="8014.3789" y="8404.1182">Target organization:</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="232.9893" x="8157.9336" y="8404.1182">`core` and `tui` are separate crates.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="451.0078" x="8014.3789" y="8421.0576">`core` has no terminal imports and no `crossterm` / `ui` dependency.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="262.6982" x="8014.3789" y="8437.9971">`tui` depends on `core` and `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="379.415" x="8014.3789" y="8454.9365">`ui` is a terminal UI primitives module inside `tui` (`tui::ui`);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="173.9404" x="8014.3789" y="8471.876">it depends on `crossterm`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="390.4414" x="8014.3789" y="8488.8154">A GUI or web frontend uses `core` directly and ignores `ui`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="8014.3789" y="8505.7549">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="153.7744" x="8014.3789" y="8522.6943">`Buffer` lives in `core`.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="215.4277" x="8172.0908" y="8522.6943">It is pure data &#8212; lines, extmarks,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="435.4014" x="8014.3789" y="8539.6338">namespaces, undo. Zero terminal deps. Headless reads transcript</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="383.1338" x="8014.3789" y="8556.5732">content through the same surface as the TUI does. Parser</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="420.1572" x="8014.3789" y="8573.5127">*implementations* (markdown / diff / syntax / bash) stay in `tui`</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="381.2471" x="8014.3789" y="8590.4521">because they pull from `tui::content::highlight::*` (syntect,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="179.0879" x="8014.3789" y="8607.3916">inline markdown, diff LCS).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="8014.3789" y="8624.3311">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="274.1895" x="8014.3789" y="8641.2705">Lua's drawing context is full, not partial.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="91.3145" x="8292.5059" y="8641.2705">Tool / dialog /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="423.5342" x="8014.3789" y="8658.21">statusline `render` callbacks receive a `Buffer` userdata with the</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9072" x="8014.3789" y="8675.1494">full Buffer API (set_lines / add_highlight / set_extmark / attach /</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="488.7969" x="8014.3789" y="8692.0889">namespaces / virt-text). No `RenderCtx`-style enum-of-allowed-methods.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="406.793" x="8014.3789" y="8709.0283">Shipped Rust renderers (smelt.bash.render, smelt.diff.render,</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="447.2959" x="8014.3789" y="8725.9678">smelt.syntax.render, smelt.notebook.render) sit on top of the Buffer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="251.7334" x="8014.3789" y="8742.9072">API as conveniences, not in front of it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="8014.3789" y="8759.8467">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="377.1387" x="8014.3789" y="8776.7861">No tool/command/dialog/mode name matching in Rust.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="109.498" x="8395.4551" y="8776.7861">A `match name {</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="397.127" x="8014.3789" y="8793.7256">"bash" =&gt; &#8230; }` over a Lua-registered identifier is a bug. The</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="394.502" x="8014.3789" y="8810.665">registration table carries the metadata; Rust calls through it.</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="3.9375" x="8014.3789" y="8827.6045">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="249.3887" x="8014.3789" y="8844.5439">Plugin-author surface (P9.f-k, plan).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="161.7998" x="8267.7051" y="8844.5439">Namespaces are integer</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="454.5625" x="8014.3789" y="8861.4834">handles minted by `smelt.api.create_namespace`. Extmark API is one</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="330.6748" x="8014.3789" y="8878.4229">keyset call mirroring nvim verbatim. Plugins live in</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="429.7617" x="8014.3789" y="8895.3623">`/.config/smelt/` AND project-local `&lt;cwd&gt;/.smelt/` (trust-gated).</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="412.0635" x="8014.3789" y="8912.3018">Tool files auto-register on require. Prompt sections register as</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="401.96" x="8014.3789" y="8929.2412">closures (statusline pattern). Cell subscribers see (new, old);</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="405.3779" x="8014.3789" y="8946.1807">built-in names typed. Provider middleware mutates request +</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="414.9756" x="8014.3789" y="8963.1201">response. `require` searches workspace + user runtime before</text><text fill="#000000" font-family="'Inter'" font-size="14" lengthAdjust="spacing" textLength="417.6895" x="8014.3789" y="8980.0596">embedded fallback. Read-only tools opt into parallel execution.</text></g><?plantuml-src jNtfSXjPbjv_FCKrEs84K5YgfySTrH1B4nH5IfocI0QNMjfo00aW0MGpaOd9XHIhL0x_wlyUEy9lu5UO_-CtwIVn-SuvTqa0PDTuL8ge8f3tvbtEFVjoyP_MHRHOHIQD7lEwCd5wrsgLTqcsZefePQPfL9Q7LLKaaxgAJwTvTfty69klWYxbCfhb3qcsCFCeBUEWfSZhR7QK5rbScDy7psVnFAhJw