" fill="#EEFFEE" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Inter'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="245.8828" x="1420.8969" y="84.4727">Buffer vs Window &#8212; what goes where.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="298.8159" x="1420.8969" y="100.2021">Rule of thumb: anything that would *differ* if the</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="320.0361" x="1420.8969" y="115.9316">same content were shown in two viewports goes on</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="255.2646" x="1420.8969" y="131.6611">Window; anything shared goes on Buffer.</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="3.6563" x="1420.8969" y="147.3906">&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="50.4829" x="1424.5531" y="165.1201">concern</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="38.2891" x="1533.1742" y="165.1201">Buffer</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="50.0322" x="1578.7758" y="165.1201">Window</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" text-decoration="line-through" textLength="5.9795" x="1420.8969" y="180.8496">-</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" text-decoration="line-through" textLength="5.9795" x="1426.8763" y="180.8496">-</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" text-decoration="line-through" textLength="5.9795" x="1432.8558" y="180.8496">-</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="11.959" x="1438.8353" y="180.8496">--</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" text-decoration="line-through" textLength="5.9795" x="1529.5179" y="180.8496">-</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="17.9385" x="1535.4974" y="180.8496">---</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" text-decoration="line-through" textLength="5.9795" x="1575.1195" y="180.8496">-</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="17.9385" x="1581.099" y="180.8496">---</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="63.5972" x="1424.5531" y="196.5791">lines / text</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1540.4867" y="196.5791">X</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1575.1195" y="196.5791">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="56.5068" x="1424.5531" y="212.3086">extmarks</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="8.8677" x="1540.4867" y="212.3086">X</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1575.1195" y="212.3086">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="68.0532" x="1428.2094" y="228.0381">(highlights,</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1529.5179" y="228.0381">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter'" font-size="13" lengthAdjust="spacing" textLength="29.25" x="1575.1195" y="228.038